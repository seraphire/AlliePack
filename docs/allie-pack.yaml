# Example AlliePack configuration
# Run: AlliePack.exe docs/allie-pack.yaml --report

product:
  name: "AlliePack"
  manufacturer: "ByteCraft"
  version:
    source: "git-tag"
  description: "AlliePack installer builder"
  upgradeCode: "28e08d6c-67c8-47e1-95c5-0e6e7686588a"
  installScope: "perMachine"
  platform: "x64"
  # licenseFile: "license.rtf"   # uncomment to add a license agreement dialog

aliases:
  bin: "[GitRoot]/src/AlliePack/bin/Release/net481"

structure:
  - folder:
    contents:
      - source: "bin:AlliePack.exe"
      - source: "bin:*.dll"
        excludeFiles:
          - "*.pdb"

  - folder: "Samples"
    contents:
      - source: "[GitRoot]/test/features/**/*"
        excludeFiles:
          - "*.msi"
          - "*.exe"
          - "*.dll"
          - "bin/**/*"
          - "obj/**/*"

# Uncomment to build from Visual Studio outputs instead:
#
# structure:
#   - folder: "App"
#     contents:
#       - solution: "AlliePack.sln"
#         configuration: "Release"
#         excludeFiles:
#           - "*.pdb"

shortcuts:
  - name: "AlliePack"
    target: "[INSTALLDIR]\\AlliePack.exe"
    description: "AlliePack MSI builder"
    folder: "[ProgramMenuFolder]"

# Optional: sign the MSI after building.
# Uncomment one of the signing providers below.
# See docs/signing.md for the full reference.
#
# signing:
#   thumbprint: "ABCDEF1234567890ABCDEF1234567890ABCDEF12"
#   timestampUrl: "http://timestamp.digicert.com"
#
# signing:
#   pfx: "[YamlDir]/certs/MyApp.pfx"
#   pfxPassword: "[SIGN_PASSWORD]"      # pass via: --define SIGN_PASSWORD=<value>
#   timestampUrl: "http://timestamp.digicert.com"
#
# signing:
#   azure:
#     endpoint: "https://eus.codesigning.azure.net"
#     account: "MySigningAccount"
#     certificateProfile: "MyProfile"
#     dlibPath: '[DLIB_PATH]'           # pass via: --define DLIB_PATH=<path to Azure.CodeSigning.Dlib.dll>
#   timestampUrl: "http://timestamp.acs.microsoft.com"
