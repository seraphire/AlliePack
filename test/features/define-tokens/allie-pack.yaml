# define-tokens feature test
#
# Demonstrates: --define / -D token substitution using the $(NAME) compile-time
# token syntax.  Tokens are replaced everywhere in the file before the Package
# is produced.  This lets a single Package Definition produce multiple variant
# Packages without conditional blocks or separate configs.
#
# Common use cases:
#   - Inject build-time version from CI (e.g. from git tag or build number)
#   - Vary product name/edition for OEM or channel builds
#   - Parameterise install paths or registry keys
#
# Build (with substitution):
#   AlliePack.exe allie-pack.yaml -D VERSION=2.1.0.0 EDITION=Community \
#       --output output\define-tokens-community.msi
#
#   AlliePack.exe allie-pack.yaml -D VERSION=2.1.0.0 EDITION=Professional \
#       --output output\define-tokens-professional.msi
#
# Report (verify resolved values without building):
#   AlliePack.exe allie-pack.yaml -D VERSION=2.1.0.0 EDITION=Community --report
#
# NOTE: Install-time tokens such as [INSTALLDIR] use [NAME] syntax and are
# resolved by Windows Installer at install time -- they are NOT compile-time
# tokens and are intentionally left unchanged by AlliePack.

product:
  name: "DefineTest $(EDITION)"
  manufacturer: "AlliePack"
  version: "$(VERSION)"
  upgradeCode: "a1b2c3d4-0001-0002-0003-000000000050"
  platform: "x64"
  installScope: perMachine

aliases:
  bin: "."

structure:
  - source: "bin:app.exe"

environment:
  - name: "DEFINETEST_EDITION"
    value: "$(EDITION)"
    scope: machine

shortcuts:
  - name: "DefineTest $(EDITION)"
    target: "[INSTALLDIR]\\app.exe"
    description: "DefineTest $(EDITION) shortcut"
    folder: startmenu
